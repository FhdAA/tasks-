<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الفروع</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background: #f5f5f5;
}

.container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 300px;
  border-radius: 10px;
}

input, button {
  margin: 10px;
  padding: 10px;
  width: 90%;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h3>تسجيل الدخول</h3>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
</div>

<div class="container hidden" id="tasksBox">
  <h3 id="branchName"></h3>

  <label><input type="checkbox" id="open"> فتح المحل بالوقت المحدد</label><br>
  <label><input type="checkbox" id="arrange"> ترتيب البضاعة</label><br>
  <label><input type="checkbox" id="clean"> تنظيف المحل</label><br>

  <input type="number" id="sales" placeholder="عدد المبيعات">
  <input type="number" id="invoices" placeholder="عدد الفواتير">
  <input type="text" id="attendance" placeholder="الحضور والغيابات">

  <button onclick="sendReport()">إرسال التقرير</button>
</div>

<script>
(function(){
  emailjs.init("0mQuxko5lxhzTHMhD");
})();

const users = {
  zuhur: "123",
  muthanna: "123",
  thaqafa: "123"
};

let currentBranch = "";

function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(users[u] && users[u] === p){
    currentBranch = u;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("tasksBox").classList.remove("hidden");
    document.getElementById("branchName").innerText = "فرع: " + u;
  } else {
    alert("بيانات غير صحيحة");
  }
}

function sendReport() {
  let data = {
    branch: currentBranch,
    open: document.getElementById("open").checked ? "✔" : "✖",
    arrange: document.getElementById("arrange").checked ? "✔" : "✖",
    clean: document.getElementById("clean").checked ? "✔" : "✖",
    sales: document.getElementById("sales").value,
    invoices: document.getElementById("invoices").value,
    attendance: document.getElementById("attendance").value,
    date: new Date().toLocaleDateString()
  };

  emailjs.send("service_xlj0sfq","template_k6ix10l", data)
    .then(() => {
      alert("تم إرسال التقرير ✅");
    })
    .catch((error) => {
      console.log(error);
      alert("فشل الإرسال ❌");
    });
}
</script>

</body>
</html>
